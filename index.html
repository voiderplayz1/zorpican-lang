<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingy Translator Pro</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #121212; color: #4CAF50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #selectionScreen { text-align: center; background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #4CAF50; }
        .device-btn { background: #4CAF50; color: #121212; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; }
        #app { display: none; background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid #4CAF50; transition: width 0.3s; }
        body.mode-pc #app { width: 700px; }
        body.mode-phone #app { width: 95%; height: 95vh; display: flex; flex-direction: column; justify-content: space-around; }
        textarea { width: 100%; height: 120px; background: #262626; color: #fff; border: 1px solid #4CAF50; border-radius: 8px; padding: 12px; font-size: 16px; margin: 10px 0; resize: none; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-switch { background: #333; color: #4CAF50; border: 1px solid #4CAF50; }
        .btn-copy { background: #4CAF50; color: #121212; }
        .syllable-toggle { grid-column: span 2; background: #1a3a1a; color: #81C784; border: 1px dashed #4CAF50; }
        h1 { text-align: center; margin: 0 0 10px 0; font-size: 20px; }
        label { font-size: 12px; opacity: 0.8; }
        .status { text-align: center; height: 20px; font-size: 12px; color: #81C784; }
    </style>
</head>
<body>

<div id="selectionScreen">
    <h1>CHOOSE YOUR TERMINAL</h1>
    <button class="device-btn" onclick="start('phone')">MOBILE</button>
    <button class="device-btn" onclick="start('pc')">DESKTOP</button>
</div>

<div id="app">
    <h1 id="title">ENGLISH ➔ THINGY</h1>
    
    <label id="labelIn">INPUT:</label>
    <textarea id="input" placeholder="Type here..." oninput="run()"></textarea>

    <div class="controls">
        <button class="btn btn-switch" onclick="swap()">🔄 SWAP DIRECTION</button>
        <button class="btn btn-copy" onclick="copy()">📋 COPY RESULT</button>
        <button class="btn syllable-toggle" id="syllableBtn" onclick="toggleSyllables()">SYLLABLE MODE: OFF</button>
    </div>

    <label id="labelOut">OUTPUT:</label>
    <textarea id="output" readonly></textarea>
    <div class="status" id="status"></div>
</div>

<script>
    let isEnToTh = true;
    let syllableMode = false;
    const cipher = {'a':'zep','b':'zorp','c':'zeep','d':'zorpg','e':'zang','f':'zeepy','g':'zkeep','h':'hoip','i':'zepy','j':'kepy','k':'korp','l':'zorg','m':'morkg','n':'mork','o':'oopz','p':'pork','q':'lorp','r':'lulz','s':'szeep','t':'kalz','u':'zeeps','v':'zleep','w':'xeek','x':'kex','y':'zog','z':'wat'};
    const revCipher = Object.fromEntries(Object.entries(cipher).map(([k, v]) => [v, k]));
    const sortedKeys = Object.keys(revCipher).sort((a,b) => b.length - a.length);

    function start(mode) {
        document.getElementById('selectionScreen').style.display = 'none';
        document.body.className = 'mode-' + mode;
        document.getElementById('app').style.display = 'block';
    }

    function toggleSyllables() {
        syllableMode = !syllableMode;
        document.getElementById('syllableBtn').innerText = "SYLLABLE MODE: " + (syllableMode ? "ON" : "OFF");
        run();
    }

    function swap() {
        isEnToTh = !isEnToTh;
        document.getElementById('title').innerText = isEnToTh ? "ENGLISH ➔ THINGY" : "THINGY ➔ ENGLISH";
        document.getElementById('input').value = document.getElementById('output').value.replace(/\|/g, '');
        run();
    }

    function run() {
        const val = document.getElementById('input').value;
        document.getElementById('output').value = isEnToTh ? toTh(val) : toEn(val);
    }

    function toTh(text) {
        let res = [];
        for (let char of text) {
            let low = char.toLowerCase();
            if (cipher[low]) {
                let chunk = (char === char.toUpperCase()) ? cipher[low][0].toUpperCase() + cipher[low].slice(1) : cipher[low];
                res.push(chunk);
            } else {
                res.push(char);
            }
        }
        return res.join(syllableMode ? '|' : '');
    }

    function toEn(text) {
        let clean = text.replace(/\|/g, '');
        let res = '';
        let i = 0;
        while (i < clean.length) {
            let match = sortedKeys.find(k => clean.toLowerCase().substring(i, i + k.length) === k);
            if (match) {
                let L = revCipher[match];
                res += (clean[i] === clean[i].toUpperCase()) ? L.toUpperCase() : L;
                i += match.length;
            } else {
                res += clean[i];
                i++;
            }
        }
        return res;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('output').value);
        document.getElementById('status').innerText = "COPIED TO CLIPBOARD";
        setTimeout(() => document.getElementById('status').innerText = "", 2000);
    }
</script>
</body>
</html>
