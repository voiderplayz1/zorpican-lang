:root {
  --bg-top: #ffffff;
  --bg-bot: #e4d9f5;
  --primary: #7c6b9e;
  --primary-dark: #5a4c7a;
  --primary-light: #a899c8;
  --accent: #c9bce4;
  --text: #3d3550;
  --text-muted: #9585b8;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-bright: rgba(255, 255, 255, 0.92);
  --border: rgba(190, 170, 230, 0.38);
  --shadow: 0 8px 40px rgba(100, 80, 160, 0.13);
  --shadow-sm: 0 3px 14px rgba(100, 80, 160, 0.09);
  --radius: 22px;
  --radius-sm: 14px;
}

html { height: 100%; }

body {
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  min-height: 100%;
  background: linear-gradient(160deg, var(--bg-top) 0%, #f0e8fb 50%, var(--bg-bot) 100%);
  background-attachment: fixed;
  overflow-x: hidden;
}

/* Ambient orbs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(196, 170, 240, 0.22) 0%, transparent 65%);
  top: -250px; right: -200px;
}
body::after {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(210, 190, 248, 0.18) 0%, transparent 65%);
  bottom: -150px; left: -150px;
}

/* ==================== SCREENS ==================== */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; animation: screenIn 0.55s cubic-bezier(0.22, 1, 0.36, 1); }

@keyframes screenIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ==================== DEVICE SELECT ==================== */
#screen-device {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
}

.brand {
  margin-bottom: 3.5rem;
}
.brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 12vw, 7rem);
  font-weight: 300;
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--primary-dark);
}
.brand-title em {
  font-style: italic;
  background: linear-gradient(120deg, var(--primary-dark), var(--primary), #b09ad8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-sub {
  margin-top: 0.6rem;
  font-size: 0.82rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 400;
}

.device-prompt {
  font-size: 1rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-bottom: 1.75rem;
  letter-spacing: 0.04em;
}

.device-cards {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}

.device-card {
  background: var(--surface);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.5rem 3rem;
  cursor: pointer;
  text-align: center;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.3s ease,
              background 0.2s ease;
  box-shadow: var(--shadow);
  min-width: 190px;
}
.device-card:hover {
  transform: translateY(-8px) scale(1.03);
  background: var(--surface-bright);
  box-shadow: 0 20px 60px rgba(100, 80, 160, 0.2);
}
.device-card .icon {
  font-size: 2.75rem;
  margin-bottom: 0.8rem;
  display: block;
}
.device-card .label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.75rem;
  font-weight: 400;
  color: var(--primary-dark);
}
.device-card .hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 300;
  margin-top: 0.3rem;
}

/* ==================== MAIN APP ==================== */
#screen-app { flex-direction: column; }

/* PC layout */
body.mode-pc #screen-app {
  align-items: center;
  min-height: 100vh;
  padding: 2.5rem 1.5rem 3rem;
}
body.mode-pc .app-container {
  width: 100%;
  max-width: 860px;
}

/* Phone layout */
body.mode-phone #screen-app {
  height: 100vh;
  padding: 0;
  overflow: hidden;
}
body.mode-phone .app-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 1.1rem 1.1rem 1.4rem;
}

/* ==================== BACK BUTTON ==================== */
.back-btn {
  position: fixed;
  top: 0.9rem;
  left: 0.9rem;
  z-index: 200;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.35rem 0.9rem;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  letter-spacing: 0.02em;
}
.back-btn:hover { color: var(--primary); background: var(--surface-bright); }

/* ==================== HEADER ==================== */
.app-header {
  text-align: center;
  margin-bottom: 1.5rem;
}
body.mode-phone .app-header { margin-bottom: 0.8rem; }

.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--primary-dark);
}
.app-title em {
  font-style: italic;
  background: linear-gradient(110deg, var(--primary-dark), var(--primary), #b09ad8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-tagline {
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 0.25rem;
}

/* ==================== CONTROLS ==================== */
.controls-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 0.9rem;
  flex-wrap: wrap;
}
body.mode-phone .controls-bar { margin-bottom: 0.6rem; }

.btn {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 0.5rem 1.3rem;
  border-radius: 100px;
  border: 1.5px solid var(--accent);
  cursor: pointer;
  transition: all 0.22s ease;
  letter-spacing: 0.03em;
  white-space: nowrap;
  line-height: 1.2;
}
body.mode-phone .btn { font-size: 0.95rem; padding: 0.6rem 1.45rem; }

.btn-primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.btn-primary:hover {
  background: var(--primary-dark);
  border-color: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 5px 18px rgba(100,80,160,0.28);
}

.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  padding: 0.42rem 1rem 0.42rem 0.75rem;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(10px);
  transition: background 0.2s;
}
body.mode-phone .toggle-wrap { font-size: 0.9rem; padding: 0.55rem 1.1rem 0.55rem 0.85rem; }
.toggle-wrap:hover { background: var(--surface-bright); }

.toggle-switch {
  position: relative;
  width: 40px; height: 22px;
  background: var(--accent);
  border-radius: 100px;
  transition: background 0.25s;
  flex-shrink: 0;
}
body.mode-phone .toggle-switch { width: 46px; height: 26px; }
.toggle-switch.on { background: var(--primary); }
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: white;
  top: 3px; left: 3px;
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}
body.mode-phone .toggle-switch::after { width: 20px; height: 20px; }
.toggle-switch.on::after { transform: translateX(18px); }
body.mode-phone .toggle-switch.on::after { transform: translateX(20px); }

.direction-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  margin-bottom: 1rem;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
body.mode-phone .direction-banner { margin-bottom: 0.6rem; font-size: 0.85rem; }
.direction-banner .lang { color: var(--text); }
.direction-banner .arrow {
  color: var(--primary-light);
  font-size: 1.1rem;
}

.translator {
  display: grid;
  gap: 1.25rem;
}
body.mode-pc .translator { grid-template-columns: 1fr 1fr; }
body.mode-phone .translator {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;

  min-height: 0;
  overflow: hidden;

<script>
  /* ========================================================
     DICTIONARY
  ======================================================== */
  const DICT = {
    a:'zep',  b:'zorp', c:'zeep',  d:'zorpg', e:'zang',  f:'zeepy',
    g:'zkeep',h:'hoip', i:'zepy',  j:'kepy',  k:'korp',  l:'zorg',
    m:'morkg',n:'mork', o:'oopz',  p:'pork',  q:'lorp',  r:'lulz',
    s:'szeep',t:'kalz', u:'zeeps', v:'zleep', w:'xeek',  x:'kex',
    y:'zog',  z:'wat'
  };

  // Reverse lookup sorted longest-sound-first for greedy decoding
  const REVERSE = Object.entries(DICT)
    .map(([letter, sound]) => ({ letter, sound }))
    .sort((a, b) => b.sound.length - a.sound.length);

  /* ========================================================
     STATE
  ======================================================== */
  let direction    = 'toThingy';   // 'toThingy' | 'toEnglish'
  let syllableMode = false;

  /* ========================================================
     DEVICE SELECTION
  ======================================================== */
  function selectDevice(d) {
    document.body.classList.toggle('mode-phone', d === 'phone');
    document.body.classList.toggle('mode-pc',    d === 'pc');
    showScreen('screen-app');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goBack() {
    document.getElementById('input-text').value = '';
    setOutput('');
    showScreen('screen-device');
  }

  /* ========================================================
     TRANSLATION CORE
  ======================================================== */
  function toThingy(text) {
    let result      = '';
    let soundBuffer = [];

    for (const ch of text) {
      const lower = ch.toLowerCase();
      if (DICT[lower] !== undefined) {
        const sound   = DICT[lower];
        const isUpper = /[A-Z]/.test(ch);
        soundBuffer.push(isUpper ? sound[0].toUpperCase() + sound.slice(1) : sound);
      } else {
        if (soundBuffer.length) {
          result += syllableMode ? soundBuffer.join('|') : soundBuffer.join('');
          soundBuffer = [];
        }
        result += ch;
      }
    }
    if (soundBuffer.length) {
      result += syllableMode ? soundBuffer.join('|') : soundBuffer.join('');
    }
    return result;
  }

  function decodeSegment(seg) {
    const lower = seg.toLowerCase();
    let result  = '';
    let i       = 0;
    while (i < lower.length) {
      let matched = false;
      for (const { letter, sound } of REVERSE) {
        if (lower.startsWith(sound, i)) {
          const isUpper = /[A-Z]/.test(seg[i]);
          result += isUpper ? letter.toUpperCase() : letter;
          i += sound.length;
          matched = true;
          break;
        }
      }
      if (!matched) { result += seg[i]; i++; }
    }
    return result;
  }

  function toEnglish(text) {
    // Strip syllable separators then decode alpha runs
    return text.replace(/\|/g, '').replace(/[a-zA-Z]+/g, seg => decodeSegment(seg));
  }

  /* ========================================================
     INPUT HANDLER
  ======================================================== */
  function onInput() {
    const raw    = document.getElementById('input-text').value;
    const result = direction === 'toThingy' ? toThingy(raw) : toEnglish(raw);
    document.getElementById('input-char-count').textContent = raw.length + ' chars';
    setOutput(result);
  }

  function setOutput(text) {
    const el = document.getElementById('output-area');
    const cc = document.getElementById('output-char-count');
    if (!text) {
      el.textContent = 'Translation will appear here…';
      el.classList.add('empty');
      cc.textContent = '';
    } else {
      el.textContent = text;
      el.classList.remove('empty');
      cc.textContent = text.length + ' chars';
    }
  }

  /* ========================================================
     SWITCH DIRECTION
  ======================================================== */
  function switchDirection() {
    direction = direction === 'toThingy' ? 'toEnglish' : 'toThingy';
    const fwd = direction === 'toThingy';

    document.getElementById('from-label').textContent         = fwd ? 'English' : 'Thingy';
    document.getElementById('to-label').textContent           = fwd ? 'Thingy'  : 'English';
    document.getElementById('input-panel-label').textContent  = fwd ? 'English' : 'Thingy';
    document.getElementById('output-panel-label').textContent = fwd ? 'Thingy'  : 'English';
    document.getElementById('input-text').placeholder         = fwd
      ? 'Type in English…'
      : 'Paste Thingy text… (| separators are fine)';

    // Syllable toggle only makes sense in English → Thingy
    document.getElementById('syllable-wrap').classList.toggle('hidden', !fwd);

    onInput();
  }

  /* ========================================================
     SYLLABLE TOGGLE
  ======================================================== */
  function toggleSyllables() {
    syllableMode = !syllableMode;
    document.getElementById('syllable-toggle').classList.toggle('on', syllableMode);
    onInput();
  }

  /* ========================================================
     COPY
  ======================================================== */
  function copyOutput() {
    const el   = document.getElementById('output-area');
    const text = el.classList.contains('empty') ? '' : el.textContent;
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2200);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }
</script>
