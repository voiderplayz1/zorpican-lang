<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorpican — Secret Language Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark:  #4e3f74;
      --purple:       #6b5a99;
      --purple-mid:   #8e7bba;
      --purple-light: #b5a6d8;
      --purple-pale:  #ddd5f5;
      --text:         #36284d;
      --text-muted:   #8a78ae;
      --white:        #ffffff;
      --border:       rgba(170, 148, 215, 0.35);
      --green:        #62b48a;
      --radius:       18px;
    }

    html { height: 100%; }

    body {
      font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      min-height: 100%;
      background-color: #cfc0f4;
      background-image: linear-gradient(170deg,
        #ffffff  0%,
        #f0eafd  28%,
        #e0d4f9  58%,
        #cfc0f4  100%
      );
      background-size: 100% 100vh;
      background-repeat: no-repeat;
    }

    /* Decorative blobs — fixed is fine for non-content elements */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob  { position: absolute; border-radius: 50%; filter: blur(55px); opacity: .4; }
    .blob-1 { width: 500px; height: 500px; top: -150px; right: -150px; background: #c9b8ee; }
    .blob-2 { width: 380px; height: 380px; bottom: -100px; left: -100px; background: #d8cdfa; }

    /* ── Screens ── */
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active {
      display: flex;
      animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ======================================================
       DEVICE SELECT
    ====================================================== */
    #screen-device {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
      text-align: center;
    }

    .brand { margin-bottom: 3rem; }

    .brand-title {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      font-size: clamp(4rem, 13vw, 7rem);
      font-weight: 300;
      line-height: .95;
      letter-spacing: -.03em;
      font-style: italic;
      color: var(--purple-dark);
    }
    .brand-sub {
      margin-top: .6rem;
      font-size: .75rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .device-prompt {
      font-size: .95rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1.6rem;
    }

    .device-cards {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .device-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2.2rem 2.8rem;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 8px 32px rgba(90,70,155,.14);
      min-width: 175px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
    }
    .device-card:hover {
      transform: translateY(-7px) scale(1.025);
      box-shadow: 0 18px 52px rgba(90,70,155,.22);
    }
    .device-card .icon { font-size: 2.5rem; display: block; margin-bottom: .7rem; }
    .device-card .label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.65rem;
      font-weight: 400;
      color: var(--purple-dark);
    }
    .device-card .hint {
      font-size: .7rem;
      color: var(--text-muted);
      margin-top: .2rem;
    }

    /* ======================================================
       APP — PC
    ====================================================== */
    body.mode-pc #screen-app {
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }
    body.mode-pc .app-container {
      width: 100%;
      max-width: 860px;
    }

    /* ======================================================
       APP — PHONE
    ====================================================== */
    body.mode-phone #screen-app {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    body.mode-phone .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: .9rem 1rem 1.1rem;
    }

    /* ======================================================
       HEADER (back | title | spacer)
    ====================================================== */
    .app-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1rem;
    }
    body.mode-phone .app-header { margin-bottom: .65rem; }

    .back-btn {
      flex-shrink: 0;
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: .38rem .85rem;
      cursor: pointer;
      transition: color .18s, background .18s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--purple); background: #f3eeff; }

    .header-center { flex: 1; text-align: center; }

    .app-title {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      font-size: clamp(1.8rem, 5.5vw, 2.8rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -.025em;
      line-height: 1;
      color: var(--purple-dark);
    }
    .app-tagline {
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: .15rem;
    }

    .header-spacer { flex-shrink: 0; width: 58px; }

    /* ======================================================
       CONTROLS
    ====================================================== */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }
    body.mode-phone .controls-bar { margin-bottom: .5rem; }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      padding: .52rem 1.3rem;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.25;
      letter-spacing: .025em;
      transition: filter .2s, transform .2s;
    }
    body.mode-phone .btn { font-size: .95rem; padding: .6rem 1.45rem; }

    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover  { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-primary:active { filter: brightness(.95); transform: none; }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .84rem;
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      padding: .44rem 1rem .44rem .8rem;
      border-radius: 100px;
      background: var(--white);
      border: 1.5px solid var(--border);
      transition: background .18s;
    }
    body.mode-phone .toggle-wrap { font-size: .9rem; padding: .52rem 1.1rem .52rem .85rem; }
    .toggle-wrap:hover { background: #f3eeff; }
    .toggle-wrap.hidden { display: none !important; }

    .toggle-switch {
      position: relative;
      width: 40px; height: 22px;
      background: var(--purple-pale);
      border-radius: 100px;
      transition: background .22s;
      flex-shrink: 0;
    }
    body.mode-phone .toggle-switch { width: 46px; height: 26px; }
    .toggle-switch.on { background: var(--purple); }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 3px; left: 3px;
      transition: transform .26s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }
    body.mode-phone .toggle-switch::after { width: 20px; height: 20px; }
    .toggle-switch.on::after              { transform: translateX(18px); }
    body.mode-phone .toggle-switch.on::after { transform: translateX(20px); }

    .dir-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: .85rem;
      letter-spacing: .04em;
    }
    body.mode-phone .dir-banner { margin-bottom: .5rem; font-size: .85rem; }
    .dir-banner .lang  { color: var(--text); }
    .dir-banner .arrow { color: var(--purple-light); font-size: 1.05rem; }

    /* ======================================================
       PANELS — solid white, NO backdrop-filter
    ====================================================== */
    .translator {
      display: grid;
      gap: 1rem;
    }
    body.mode-pc .translator { grid-template-columns: 1fr 1fr; }
    body.mode-phone .translator {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .panel {
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem .9rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(90,70,155,.1);
      transition: box-shadow .22s, border-color .22s;
    }
    .panel:focus-within {
      box-shadow: 0 6px 28px rgba(90,70,155,.18), 0 0 0 2.5px var(--purple-pale);
      border-color: var(--purple-light);
    }
    body.mode-phone .panel { flex: 1; min-height: 0; }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .55rem;
    }
    .panel-label {
      font-size: .64rem;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--purple-mid);
    }
    .char-count {
      font-size: .66rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    textarea {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.7;
      flex: 1;
      min-height: 140px;
    }
    body.mode-phone textarea { font-size: 1.05rem; min-height: unset; height: 100%; }
    textarea::placeholder { color: #c2b6e0; }

    .output-area {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      word-break: break-all;
      overflow-y: auto;
      min-height: 140px;
    }
    body.mode-phone .output-area { font-size: 1.05rem; min-height: unset; }
    .output-area.empty {
      color: #c2b6e0;
      font-style: italic;
      font-weight: 300;
      word-break: normal;
    }

    .panel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .62rem;
      padding-top: .62rem;
      border-top: 1px solid var(--border);
    }

    .copy-btn {
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      padding: .38rem 1.1rem;
      border-radius: 100px;
      border: 1.5px solid var(--purple-pale);
      background: transparent;
      color: var(--purple);
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s, transform .15s;
      letter-spacing: .04em;
    }
    body.mode-phone .copy-btn { font-size: .9rem; padding: .5rem 1.2rem; }
    .copy-btn:hover {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
      transform: translateY(-1px);
    }
    .copy-btn.copied {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      transform: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple-pale); border-radius: 10px; }
  </style>
</head>
<body class="mode-pc">

  <div class="blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- ========== DEVICE SELECT ========== -->
  <div id="screen-device" class="screen active">
    <div class="brand">
      <div class="brand-title">Zorpican</div>
      <div class="brand-sub">a secret language translator</div>
    </div>
    <p class="device-prompt">How are you viewing this?</p>
    <div class="device-cards">
      <div class="device-card" onclick="selectDevice('phone')">
        <span class="icon">📱</span>
        <div class="label">Phone</div>
        <div class="hint">Full-screen · touch-friendly</div>
      </div>
      <div class="device-card" onclick="selectDevice('pc')">
        <span class="icon">🖥</span>
        <div class="label">PC</div>
        <div class="hint">Centered layout · 860px</div>
      </div>
    </div>
  </div>

  <!-- ========== APP ========== -->
  <div id="screen-app" class="screen">
    <div class="app-container">

      <div class="app-header">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <div class="header-center">
          <div class="app-title">Zorpican</div>
          <div class="app-tagline">Secret Language Translator</div>
        </div>
        <div class="header-spacer"></div>
      </div>

      <div class="controls-bar">
        <button class="btn btn-primary" onclick="switchDirection()">⇄ Switch Direction</button>
        <label class="toggle-wrap" id="syllable-wrap" onclick="toggleSyllables()">
          <span>Syllables</span>
          <div class="toggle-switch" id="syllable-toggle"></div>
        </label>
      </div>

      <div class="dir-banner">
        <span class="lang" id="from-label">English</span>
        <span class="arrow">→</span>
        <span class="lang" id="to-label">Zorpican</span>
      </div>

      <div class="translator">
        <div class="panel">
          <div class="panel-top">
            <span class="panel-label" id="input-panel-label">English</span>
            <span class="char-count" id="input-char-count">0 chars</span>
          </div>
          <textarea id="input-text" placeholder="Type in English…" oninput="onInput()" spellcheck="false"></textarea>
        </div>
        <div class="panel">
          <div class="panel-top">
            <span class="panel-label" id="output-panel-label">Zorpican</span>
          </div>
          <div class="output-area empty" id="output-area">Translation will appear here…</div>
          <div class="panel-footer">
            <span class="char-count" id="output-char-count"></span>
            <button class="copy-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
          </div>
        </div>
      </div>

    </div>
  </div>

<script>
  const DICT = {
    a:'zep',  b:'zorp', c:'zeep',  d:'zorpg', e:'zang',  f:'zeepy',
    g:'zkeep',h:'hoip', i:'zepy',  j:'kepy',  k:'korp',  l:'zorg',
    m:'morkg',n:'mork', o:'oopz',  p:'pork',  q:'lorp',  r:'lulz',
    s:'szeep',t:'kalz', u:'zeeps', v:'zleep', w:'xeek',  x:'kex',
    y:'zog',  z:'wat'
  };
  const REVERSE = Object.entries(DICT)
    .map(([l,s])=>({letter:l,sound:s}))
    .sort((a,b)=>b.sound.length-a.sound.length);

  let direction='toZorpican', syllableMode=false;

  function selectDevice(d) {
    document.body.classList.toggle('mode-phone', d==='phone');
    document.body.classList.toggle('mode-pc',    d!=='phone');
    showScreen('screen-app');
  }
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function goBack() {
    document.getElementById('input-text').value='';
    setOutput('');
    showScreen('screen-device');
  }

  function toZorpican(text) {
    let result='',buf=[];
    for (const ch of text) {
      const lo=ch.toLowerCase();
      if (DICT[lo]!==undefined) {
        const s=DICT[lo],up=/[A-Z]/.test(ch);
        buf.push(up?s[0].toUpperCase()+s.slice(1):s);
      } else {
        if (buf.length){result+=syllableMode?buf.join('|'):buf.join('');buf=[];}
        result+=ch;
      }
    }
    if (buf.length) result+=syllableMode?buf.join('|'):buf.join('');
    return result;
  }

  function decodeSegment(seg) {
    const lo=seg.toLowerCase();let result='',i=0;
    while(i<lo.length){
      let hit=false;
      for(const{letter,sound}of REVERSE){
        if(lo.startsWith(sound,i)){
          result+=/[A-Z]/.test(seg[i])?letter.toUpperCase():letter;
          i+=sound.length;hit=true;break;
        }
      }
      if(!hit){result+=seg[i];i++;}
    }
    return result;
  }

  function toEnglish(text){
    return text.replace(/\|/g,'').replace(/[a-zA-Z]+/g,seg=>decodeSegment(seg));
  }

  function onInput(){
    const raw=document.getElementById('input-text').value;
    const out=direction==='toZorpican'?toZorpican(raw):toEnglish(raw);
    document.getElementById('input-char-count').textContent=raw.length+' chars';
    setOutput(out);
  }
  function setOutput(text){
    const el=document.getElementById('output-area'),cc=document.getElementById('output-char-count');
    if(!text){el.textContent='Translation will appear here…';el.classList.add('empty');cc.textContent='';}
    else{el.textContent=text;el.classList.remove('empty');cc.textContent=text.length+' chars';}
  }

  function switchDirection(){
    direction=direction==='toZorpican'?'toEnglish':'toZorpican';
    const fwd=direction==='toZorpican';
    document.getElementById('from-label').textContent        =fwd?'English':'Zorpican';
    document.getElementById('to-label').textContent          =fwd?'Zorpican':'English';
    document.getElementById('input-panel-label').textContent =fwd?'English':'Zorpican';
    document.getElementById('output-panel-label').textContent=fwd?'Zorpican':'English';
    document.getElementById('input-text').placeholder        =fwd?'Type in English…':'Paste Zorpican text… (| OK)';
    document.getElementById('syllable-wrap').classList.toggle('hidden',!fwd);
    onInput();
  }

  function toggleSyllables(){
    syllableMode=!syllableMode;
    document.getElementById('syllable-toggle').classList.toggle('on',syllableMode);
    onInput();
  }

  function copyOutput(){
    const el=document.getElementById('output-area');
    if(el.classList.contains('empty'))return;
    const text=el.textContent;
    const flash=()=>{
      const btn=document.getElementById('copy-btn');
      btn.textContent='✓ Copied!';btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2200);
    };
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(flash);}
    else{
      const t=document.createElement('textarea');
      t.value=text;t.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(t);t.select();document.execCommand('copy');
      document.body.removeChild(t);flash();
    }
  }
</script>
</body>
</html>
