:root {
  --primary:       #6b5a99;
  --primary-dark:  #4e3f74;
  --primary-light: #9d8ec4;
  --accent:        #c2b2e0;
  --text:          #36284d;
  --text-muted:    #8a78ae;
  --surface:       rgba(255, 255, 255, 0.78);
  --surface-hi:    rgba(255, 255, 255, 0.95);
  --border:        rgba(185, 165, 225, 0.42);
  --shadow:        0 10px 44px rgba(90, 70, 150, 0.15);
  --shadow-sm:     0 3px 16px rgba(90, 70, 150, 0.1);
  --radius:        20px;
  --green:         #68b896;
}

html, body { height: 100%; }

body {
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  /* Strong, visible gradient — white top → lavender bottom */
  background: linear-gradient(175deg,
    #ffffff 0%,
    #f2ecfd 30%,
    #e2d5f8 65%,
    #d0bff2 100%
  );
  background-attachment: fixed;
  min-height: 100%;
  overflow-x: hidden;
}

/* Ambient blobs */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 90% 10%, rgba(188,162,238,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 10% 90%, rgba(206,188,248,0.22) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ===================== SCREENS ===================== */
.screen { display: none; position: relative; z-index: 1; }
.screen.active {
  display: flex;
  animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================== DEVICE SELECT ===================== */
#screen-device {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2.5rem 1.5rem;
  text-align: center;
}

.brand { margin-bottom: 3.5rem; }

.brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.8rem, 13vw, 7rem);
  font-weight: 300;
  line-height: .95;
  letter-spacing: -.03em;
}
.brand-title em {
  font-style: italic;
  background: linear-gradient(120deg, var(--primary-dark) 0%, var(--primary) 50%, #b09ad8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-sub {
  margin-top: .65rem;
  font-size: .78rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.device-prompt {
  font-size: 1rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 1.75rem;
}

.device-cards {
  display: flex;
  gap: 1.4rem;
  flex-wrap: wrap;
  justify-content: center;
}

.device-card {
  background: var(--surface);
  backdrop-filter: blur(22px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2.4rem 3rem;
  cursor: pointer;
  text-align: center;
  box-shadow: var(--shadow);
  min-width: 185px;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease;
}
.device-card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 22px 60px rgba(90,70,160,.22);
}
.device-card .icon { font-size: 2.6rem; display: block; margin-bottom: .75rem; }
.device-card .label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 400;
  color: var(--primary-dark);
}
.device-card .hint {
  font-size: .73rem;
  color: var(--text-muted);
  font-weight: 300;
  margin-top: .25rem;
}

/* ===================== APP SCREEN ===================== */
#screen-app { flex-direction: column; }

/* PC */
body.mode-pc #screen-app {
  align-items: center;
  min-height: 100vh;
  padding: 2rem 1.5rem 3rem;
}
body.mode-pc .app-container {
  width: 100%;
  max-width: 860px;
}

/* Phone */
body.mode-phone #screen-app {
  height: 100dvh;
  padding: 0;
  overflow: hidden;
}
body.mode-phone .app-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 1rem 1rem 1.25rem;
}

/* ===================== HEADER ROW ===================== */
/* Header contains back + title inline — no fixed positioning */
.app-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1.1rem;
}
body.mode-phone .app-header { margin-bottom: .7rem; }

.back-btn {
  flex-shrink: 0;
  font-family: 'Nunito', sans-serif;
  font-size: .78rem;

  color: var(--text-muted);

  backdrop-filter: blur(12px);

  padding: .38rem .9rem;

  white-space: nowrap;
}
.back-btn:hover { color: var(--primary); background: var(--surface-hi); }

.header-center {
  flex: 1;
  text-align: center;
}
.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5.5vw, 2.9rem);
  font-weight: 300;
  letter-spacing: -.025em;
  line-height: 1;
}
.app-title em {
  font-style: italic;
  background: linear-gradient(110deg, var(--primary-dark), var(--primary), #b09ad8);

  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-tagline {
  font-size: .65rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: .15rem;
}

/* Spacer so title stays visually centered */
.header-spacer {
  flex-shrink: 0;

}

/* ===================== CONTROLS BAR ===================== */
.controls-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .65rem;
  margin-bottom: .8rem;
  flex-wrap: wrap;
}
body.mode-phone .controls-bar { margin-bottom: .55rem; }

.btn {
  font-family: 'Nunito', sans-serif;
  font-size: .84rem;
  font-weight: 700;
  padding: .5rem 1.25rem;
  border-radius: 100px;
  border: 1.5px solid var(--accent);
  cursor: pointer;
  transition: all .22s ease;
  letter-spacing: .03em;
  white-space: nowrap;
  line-height: 1.25;
}
body.mode-phone .btn { font-size: .95rem; padding: .58rem 1.4rem; }

.btn-primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.btn-primary:hover {
  background: var(--primary-dark);
  border-color: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 5px 18px rgba(90,70,160,.28);
}

/* Syllable toggle pill */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .84rem;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  padding: .42rem 1rem .42rem .8rem;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(10px);
  transition: background .2s;
}
body.mode-phone .toggle-wrap { font-size: .9rem; padding: .5rem 1.1rem .5rem .85rem; }
.toggle-wrap:hover { background: var(--surface-hi); }
.toggle-wrap.hidden { display: none !important; }

.toggle-switch {
  position: relative;
  width: 40px; height: 22px;
  background: var(--accent);
  border-radius: 100px;
  transition: background .25s;
  flex-shrink: 0;
}
body.mode-phone .toggle-switch { width: 46px; height: 26px; }
.toggle-switch.on { background: var(--primary); }
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: white;
  top: 3px; left: 3px;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 1px 4px rgba(0,0,0,.18);
}
body.mode-phone .toggle-switch::after { width: 20px; height: 20px; }
.toggle-switch.on::after { transform: translateX(18px); }
body.mode-phone .toggle-switch.on::after { transform: translateX(20px); }

/* Direction banner */
.direction-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .55rem;
  margin-bottom: .9rem;
  font-size: .82rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .05em;
}
body.mode-phone .direction-banner { margin-bottom: .6rem; font-size: .85rem; }
.direction-banner .lang { color: var(--text); }
.direction-banner .arrow { color: var(--primary-light); font-size: 1.1rem; }

<script>
  /* ============================================================
     DICTIONARY
  ============================================================ */
  const DICT = {
    a:'zep',  b:'zorp', c:'zeep',  d:'zorpg', e:'zang',  f:'zeepy',
    g:'zkeep',h:'hoip', i:'zepy',  j:'kepy',  k:'korp',  l:'zorg',
    m:'morkg',n:'mork', o:'oopz',  p:'pork',  q:'lorp',  r:'lulz',
    s:'szeep',t:'kalz', u:'zeeps', v:'zleep', w:'xeek',  x:'kex',
    y:'zog',  z:'wat'
  };

  // Sorted longest-sound-first for greedy decode
  const REVERSE = Object.entries(DICT)
    .map(([letter, sound]) => ({ letter, sound }))
    .sort((a, b) => b.sound.length - a.sound.length);

  /* ============================================================
     STATE
  ============================================================ */
  let direction    = 'toZorpican'; // 'toZorpican' | 'toEnglish'
  let syllableMode = false;

  /* ============================================================
     DEVICE / SCREEN
  ============================================================ */
  function selectDevice(d) {
    document.body.classList.toggle('mode-phone', d === 'phone');
    document.body.classList.toggle('mode-pc',    d === 'pc');
    showScreen('screen-app');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goBack() {
    document.getElementById('input-text').value = '';
    setOutput('');
    showScreen('screen-device');
  }

  /* ============================================================
     TRANSLATION
  ============================================================ */
  function toZorpican(text) {
    let result = '', buf = [];
    for (const ch of text) {
      const lo = ch.toLowerCase();
      if (DICT[lo] !== undefined) {
        const sound = DICT[lo];
        const up    = /[A-Z]/.test(ch);
        buf.push(up ? sound[0].toUpperCase() + sound.slice(1) : sound);
      } else {
        if (buf.length) {
          result += syllableMode ? buf.join('|') : buf.join('');
          buf = [];
        }
        result += ch;
      }
    }
    if (buf.length) result += syllableMode ? buf.join('|') : buf.join('');
    return result;
  }

  function decodeSegment(seg) {
    const lo = seg.toLowerCase();
    let result = '', i = 0;
    while (i < lo.length) {
      let hit = false;
      for (const { letter, sound } of REVERSE) {
        if (lo.startsWith(sound, i)) {
          const up = /[A-Z]/.test(seg[i]);
          result += up ? letter.toUpperCase() : letter;
          i += sound.length;
          hit = true;
          break;
        }
      }
      if (!hit) { result += seg[i]; i++; }
    }
    return result;
  }

  function toEnglish(text) {
    return text.replace(/\|/g, '').replace(/[a-zA-Z]+/g, seg => decodeSegment(seg));
  }

  /* ============================================================
     INPUT / OUTPUT
  ============================================================ */
  function onInput() {
    const raw    = document.getElementById('input-text').value;
    const result = direction === 'toZorpican' ? toZorpican(raw) : toEnglish(raw);
    document.getElementById('input-char-count').textContent = raw.length + ' chars';
    setOutput(result);
  }

  function setOutput(text) {
    const el = document.getElementById('output-area');
    const cc = document.getElementById('output-char-count');
    if (!text) {
      el.textContent = 'Translation will appear here…';
      el.classList.add('empty');
      cc.textContent = '';
    } else {
      el.textContent = text;
      el.classList.remove('empty');
      cc.textContent = text.length + ' chars';
    }
  }

  /* ============================================================
     SWITCH DIRECTION
  ============================================================ */
  function switchDirection() {
    direction = direction === 'toZorpican' ? 'toEnglish' : 'toZorpican';
    const fwd = direction === 'toZorpican';

    document.getElementById('from-label').textContent         = fwd ? 'English'  : 'Zorpican';
    document.getElementById('to-label').textContent           = fwd ? 'Zorpican' : 'English';
    document.getElementById('input-panel-label').textContent  = fwd ? 'English'  : 'Zorpican';
    document.getElementById('output-panel-label').textContent = fwd ? 'Zorpican' : 'English';
    document.getElementById('input-text').placeholder         = fwd
      ? 'Type in English…'
      : 'Paste Zorpican text… (| separators OK)';

    // Syllable toggle only applies when outputting Zorpican
    document.getElementById('syllable-wrap').classList.toggle('hidden', !fwd);

    onInput();
  }

  /* ============================================================
     SYLLABLE TOGGLE
  ============================================================ */
  function toggleSyllables() {
    syllableMode = !syllableMode;
    document.getElementById('syllable-toggle').classList.toggle('on', syllableMode);
    onInput();
  }

  /* ============================================================
     COPY
  ============================================================ */
  function copyOutput() {
    const el   = document.getElementById('output-area');
    if (el.classList.contains('empty')) return;
    const text = el.textContent;

    const done = () => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2200);
    };

    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done);
    } else {
      const ta = Object.assign(document.createElement('textarea'), {
        value: text, style: 'position:fixed;opacity:0'
      });
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      done();
    }
  }
</script>
